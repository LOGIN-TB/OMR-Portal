<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #ef4444;">RBL-Listing erkannt</h2>
  <p>Der Server <strong>{{ server_name }}</strong> ({{ server_ip }}) wurde auf einer Blacklist gefunden:</p>
  <ul>
  {% for listing in listings %}
    <li>{{ listing }}</li>
  {% endfor %}
  </ul>
  <p style="color: #666; font-size: 14px;">Das spamgo-Team arbeitet an der Behebung. Bei Fragen wenden Sie sich an den Support.</p>
</body>
</html>
