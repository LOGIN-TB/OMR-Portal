<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #f59e0b;">Quota Warning</h2>
  <p>Your account <strong>{{ username }}</strong> on <strong>{{ server_name }}</strong> has reached {{ percentage }}% of the daily limit.</p>
  <p>Package: {{ package }}<br>Usage: {{ used }} / {{ limit }}</p>
  <p style="color: #666; font-size: 14px;">You can adjust your notification settings in the <a href="https://my.spamgo.de/preferences">spamgo Portal</a>.</p>
</body>
</html>
