<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #ef4444;">RBL Listing Detected</h2>
  <p>Server <strong>{{ server_name }}</strong> ({{ server_ip }}) has been found on a blacklist:</p>
  <ul>
  {% for listing in listings %}
    <li>{{ listing }}</li>
  {% endfor %}
  </ul>
  <p style="color: #666; font-size: 14px;">The spamgo team is working on resolving this. Please contact support if you have questions.</p>
</body>
</html>
