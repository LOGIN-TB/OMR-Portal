services:
  portal:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - TZ=Europe/Berlin
    networks:
      - portal-net

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - portal-net

volumes:
  caddy_data:
  caddy_config:

networks:
  portal-net:
